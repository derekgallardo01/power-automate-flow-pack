name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install --quiet pytest
      - name: Unit tests
        run: python -m pytest sim/tests/ -q
      - name: Eval harness — Asana time-entries (9 scenarios)
        run: python evals/run.py
      - name: Eval harness — Microsoft Forms responses (5 scenarios)
        run: python evals/run.py golden-forms.json sim/data/forms-responses.json sim/data/mapping-config-forms.json
      - name: Smoke-test the demo
        run: python sim/run.py
